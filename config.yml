            title: Felnőtt tanfolyamok
            description: >-
              Kezdő tanfolyam 4x3 óra, min. létszám 5 fő, max. 8 fő. 
              Egy kis elmélet után megtanuljuk a varrógépek biztonságos kezelését, alap varrástípusokkal, 
              széleldolgozó technikákkal ismerkedünk, megtanuljuk a szabás alapjait, 
              a Burda újság használatát és minden alkalommal elkészítünk egy-egy készterméket. 
              (Tolltartó, neszeszer, táska, szoknya vagy felsőrész). Amennyiben a csoport szeretné, 
              folytatási lehetőségként haladó tanfolyamot is szervezünk.

            url: '#'

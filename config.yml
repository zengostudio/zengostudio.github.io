  team:
    enable: true
    title: Rólunk
    subtitle: A VarrniJÓ alapítói
    description: >-
      Ahogy teltek az évek és a gyermekeim elérték azt a kort, amikor biztonságosan kipróbálhatták a 
      varrógéppel varrást, nagyon hamar összeállt egy csapat 7-8 éves gyerek, akikkel elindítottuk az 
      első GYEREK varrótanfolyamokat. A fő szempont a biztos alapok megtanítása mellett az volt, 
      hogy minden alkalommal  egy olyan szép és sokáig használható termék készüljön el, ami növeli a 
      gyerekek önbizalmát, kreativitását és MINDENKI sikerélményekkel gazdagabban távozzon egy-egy alkalom után. 
      Ezután nem volt megállás, egyre több gyerek csatlakozott és alkotott szebbnél szebb táskákat, tolltartókat, 
      szoknyákat, pólókat, majd ahogy nőttek és fejlődtek, egyre komolyabb dolgokat is készítettünk 
      (pl. örök sláger kapucnis pulóvert, tréning nadrágot, nyári ruhát, fürdőruhát, stb.) 
      Érdemes a VarrniJÓ Stúdió facebook oldalán megnézegetni a képeket az eddigi csoportok elkészült darabjairól.
      Mindenki nagy kedvencei lettek az adventi karácsonyi ajándékkészítő alkalmak, ahol igazi kis családdá 
      formálódtak a csoportok. 
      Az évek során kifejlesztettünk egy olyan gyerekeknek szóló komplex tananyagot és tanítási módszert, 
      ami jól használható gyakorlati tudást, nagyfokú önbizalmat és sikerélményeket eredményez.
      Emellett persze a felnőtteknek is kínáltunk minden szinten tanfolyamokat, kezdő, haladó, majd klub szinten 
      alkottunk együtt.
      Tanfolyamainkon profi, sebesség állítási lehetőséggel ellátott varrógépeken dolgozunk, ami lehetővé teszi a 
      gyerekek és kezdők számára is a biztonságos varrógéphasználatot.
      Jelen célkitűzéseink közé tartozik, hogy minél több helyre eljuttassuk tanfolyamainkat, 
      ezért megalapítottuk a VarrniJó Tanodát, hogy kibővítsük gyerekeknek és felnőtteknek szóló programjainkat.
      A tanfolyamokra 8 éves kortól várunk minden lelkes, alkotni vágyó diákot, akik szeretnének egy családias, baráti csapat 
      tagjai lenni, ahol a közös alkotásban mindenki meglelheti saját kreativitását és szerezhet életreszóló, hasznos tudást, 
      sikerélményeket. 
      Továbbá 16 éves kortól várjuk szeretettel felnőtt csoportjainkba a lelkes érdeklődőket, illetve patchwork klubunkba a már 
      varrni tudókat is kortól függetlenül. 


    members:
      - img: dori.jpg
        name: Papp Dorottya
        position: >-
          Ruhaipari mérnök, szerkesztő-modellező, tanár, a ’93-as Nemzetközi
          Burda Varróverseny európa bajnoki I. helyezettje
        bio: >-
          A főiskola elvégzése után számos divattervező mellett dolgoztam
          modellezőként, majd ezzel párhuzamosan kezdtem el hobbi
          varrótanfolyamokat tartani felnőtteknek, édesanyámmal közösen
          működtetett iskolánkban. 2008-tól két gyermekemmel voltam otthon,
          ami idő alatt új impulzusok értek és megszületett bennem a VarrniJó Stúdió ötlete, 
          ahol kreatív alkotó csomagok mellett varrótanfolyamokat tartottunk. 
          Az első pár évben Siptár Réka textilművész, divattervező, a Siptár márka alapítója 
          és vezetője, a ’93-as Burda varróverseny III. helyezettje segítette munkámat. 
          Gyönyörű, egyedi díszítéseivel gazdagította csomagjaink tartalmát és részt vett tanfolyamaink szervezésében is.

        social:
          - - fa-twitter
            - '#'
          - - fa-facebook
            - '#'
          - - fa-linkedin
            - '#'
      - img: reka.jpg
        name: Siptár Réka
        position: >-
          Textilművész, ruhatervező, interior designer, a ’93-as Nemzetközi
          Burda Varróverseny európa bajnoki III. helyezettje, a Siptár és az
          eSeR márkák megalapítója
        bio: >-
          25 éve foglalkozom ruhák tervezésével és megvalósításával, mely ruhák
          erős karakterük miatt brandé nőtték ki magukat. Egy évvel ezelőtt
          kezdtem az általam kikisérletezett textil mintázások technikáját
          tanítani, s miután Dóri megkeresett a VarrniJÓ ötletével, úgy gondolom
          kitűnő párosítás a ruhák varrása alkalmával egy egyszerűbb technikai
          megoldással színessé és egyedivé varázsolni a megalkotott darabokat.
          Ebben szeretnék segítséget nyújtani, hogy minél többen
          megtapasztalhassák az alkotás színes örömét

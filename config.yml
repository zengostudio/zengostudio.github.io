              Min. 5 fő, max. 8 fő. Korosztály: 8-15 éves korig. Minden nap 9-13 óráig várjuk a gyerekeket. 
              Azért szeretjük a nyári táborokat, mert itt lehetőség nyílik nagyobb volumenű dolgokat is elkészíteni,
              (Pl. strandtáska, nyári ruha, hűtőtáska, rajzmappa, stb.) Minden, ami a jó nyári szünethez kell!
              Több idő jut saját elképzelések, tervezések megvalósítására is. 
              Ellátás: kiadós uzsonnával készülünk.

            url: '#'
          - icon: fa-battery-2

              A gyerek tanfolyamokat 8 éves kortól ajánljuk egészen 16 éves korig. 
              Tapasztalataink szerint ez a korcsoport az, amelyik megérett a varrógép 
              biztonságos kezelésére, kellően tud koncentrálni, így biztosan sikerélményekkel 

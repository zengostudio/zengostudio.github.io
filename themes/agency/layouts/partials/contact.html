{{ "<!-- Contact Section -->" | safeHTML }}
<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">

        {{ with .Site.Params.contact.title }}
        <h2 class="section-heading">{{ . | markdownify }}</h2>
        {{ end }}

        {{ with .Site.Params.contact.address }}
        <h3 class="section-subheading text-muted">{{ . | markdownify }}</h3>
        {{ end }}

        {{ with .Site.Params.contact.phone }}
        <h3 class="section-subheading text-muted">{{ . | markdownify }}</h3>
        {{ end }}


      </div>
    </div>
    <div class="row">
      <div class="col-lg-3">
      </div>
      <div class="col-lg-6">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d674.7784860154915!2d18.912834766105046!3d47.429221500210396!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741e057da187afb%3A0x4f14c387a68f8f49!2sMunk%C3%A1csy%20Mih%C3%A1ly%20Community%20Center!5e0!3m2!1sen!2sus!4v1778416324901!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    </div>
  </div>
</section>

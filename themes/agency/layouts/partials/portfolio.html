{{ "<!-- Portfolio Grid Section -->" | safeHTML }}
<section id="portfolio" class="bg-light-gray">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading">{{ with .Site.Params.portfolio.title }}{{ . | markdownify }}{{ end }}</h2>
        <h3 class="section-subheading text-muted">{{ with .Site.Params.portfolio.subtitle }}{{ . | markdownify }}{{ end }}</h3>
      </div>
    </div>
    <div class="row">
      {{ $imagePrefix := "img/portfolio/product-" }}
      {{ range $i := seq 1 18 }}
        {{ $image := printf "%s%d.jpg" $imagePrefix $i }}
        <div class="col-md-4 col-sm-6 portfolio-item">
          <a href="{{ $image | relURL }}" class="portfolio-link" target="_blank" rel="noopener">
            <div class="portfolio-hover">
              <div class="portfolio-hover-content">
                <i class="fa fa-plus fa-3x"></i>
              </div>
            </div>
            <img src="{{ $image | relURL }}" class="img-responsive" alt="Galéria {{ $i }}">
          </a>
        </div>
      {{ end }}
    </div>
  </div>
</section>
